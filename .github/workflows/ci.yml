# .github/workflows/ci.yml
#
# GitHub Actions CI (Continuous Integration) pipeline.
#
# This runs automatically every time you push code to GitHub.
# It checks that:
#   1. Code is correctly formatted (linting)
#   2. All tests pass
#   3. Docker images build successfully
#
# Why CI matters for the Clover job:
#   - Shows you understand DevOps practices
#   - Prevents broken code from reaching production
#   - Demonstrates the CI/CD knowledge the job requires
#
# To see this in action:
#   1. Create a GitHub repo
#   2. Push your code
#   3. Go to the "Actions" tab on GitHub

name: ReleasePilot CI

# ── When to run ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]   # Run on pushes to these branches
  pull_request:
    branches: [ main, master ]            # Run on PRs targeting these branches

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint and Test ─────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest               # Use GitHub's free Ubuntu runner

    steps:
      # Step 1: Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"                   # Cache pip downloads = faster runs

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Lint with flake8 (checks for syntax errors and style issues)
      # E501 = line too long (we ignore it for readability)
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --ignore=E501,W503 --exclude=venv/
        continue-on-error: true

      # Step 5: Run tests
      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_MODEL: tinyllama
          PYTHONPATH: .
        run: |
          pytest tests/ -v --tb=short
        # If tests/ folder is empty, this step is skipped gracefully

  # ── Job 2: Build Docker images ────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test                          # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx (modern Docker build tool)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the backend image (don't push — just verify it builds)
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false                    # Set to true + add docker login to push to DockerHub
          tags: releasepilot-backend:latest
          cache-from: type=gha          # Use GitHub Actions cache
          cache-to: type=gha,mode=max

      # Build the dashboard image
      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: false
          tags: releasepilot-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: CI Complete
        run: echo "✅ All images built successfully"
